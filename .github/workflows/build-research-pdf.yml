name: Build Research PDF

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: xu-cheng/latex-action@v4
        with:
          root_file: quality_measurement_framework.tex
          working_directory: research/articles
      - name: Rename PDF
        run: mv research/articles/quality_measurement_framework.pdf CopilotScope_Quality_Framework.pdf
      - uses: actions/upload-artifact@v4
        with:
          name: CopilotScope_Quality_Framework
          path: CopilotScope_Quality_Framework.pdf

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: CopilotScope_Quality_Framework
      - uses: softprops/action-gh-release@v2
        with:
          files: CopilotScope_Quality_Framework.pdf
