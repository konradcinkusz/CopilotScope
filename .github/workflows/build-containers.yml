# Builds and publishes the CopilotScope images to GitHub Container Registry
# when a release tag is pushed (e.g. v1.0.0). Create a release via GitHub UI —
# that automatically creates the tag and triggers this workflow. Images:
#   ghcr.io/konradcinkusz/copilotscope-collector
#   ghcr.io/konradcinkusz/copilotscope-dashboard
#
# Each release produces three image tags: the version (e.g. v1.0.0), major.minor
# (e.g. v1.0) and latest. The workflow_dispatch trigger allows a manual re-run
# from the Actions tab without pushing a new tag.
#
# Note: packages published by a workflow are private by default — flip them to
# public once in GitHub → Packages → <package> → Settings → Change visibility,
# so users can `docker pull` without authentication.
name: build containers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: copilotscope-collector
            dockerfile: Dockerfile
          - image: copilotscope-dashboard
            dockerfile: Dockerfile.dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
