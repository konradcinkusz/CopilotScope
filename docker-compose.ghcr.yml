# Pull-and-run — NO repository clone needed. Download just this file:
#   curl -O https://raw.githubusercontent.com/konradcinkusz/copilotscope/master/docker-compose.ghcr.yml
#   docker compose -f docker-compose.ghcr.yml up
# Dashboard: http://localhost:5200 · OTLP ingest: http://localhost:4318 (x-api-key: dev-secret-123)
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: copilotdb
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot-dev
    volumes:
      - copilotscope-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot -d copilotdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  collector:
    image: ghcr.io/konradcinkusz/copilotscope-collector:latest
    ports:
      - "4318:4318"
    environment:
      ConnectionStrings__copilotdb: "Host=postgres;Database=copilotdb;Username=copilot;Password=copilot-dev"
      CopilotScope__Ingest__ApiKey: "dev-secret-123"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    image: ghcr.io/konradcinkusz/copilotscope-dashboard:latest
    ports:
      - "5200:8080"
    environment:
      Collector__BaseUrl: "http://collector:4318"
    depends_on:
      - collector
    restart: unless-stopped

volumes:
  copilotscope-pgdata:
