# Tryb "kliencki" bez Aspire: kolektor + dashboard + Postgres w kontenerach.
#   docker compose up --build
#   Dashboard:  http://localhost:5200
#   OTLP:       http://localhost:4318   (VS Code → github.copilot.chat.otel.otlpEndpoint)
#   Auth ingest: OTEL_EXPORTER_OTLP_HEADERS=x-api-key=dev-secret-123 przed startem VS Code
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: copilotdb
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot-dev
    volumes:
      - copilotscope-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot -d copilotdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  collector:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4318:4318"
    environment:
      ConnectionStrings__copilotdb: "Host=postgres;Database=copilotdb;Username=copilot;Password=copilot-dev"
      CopilotScope__Ingest__ApiKey: "dev-secret-123"
      # Opcjonalny forward do drugiego backendu OTLP (np. Grafana Cloud):
      # CopilotScope__Forward__Endpoint: "https://otlp-gateway-....grafana.net/otlp"
      # CopilotScope__Forward__Headers__Authorization: "Basic <base64>"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "5200:8080"
    environment:
      Collector__BaseUrl: "http://collector:4318"
    depends_on:
      - collector
    restart: unless-stopped

volumes:
  copilotscope-pgdata:
