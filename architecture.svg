<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 820" role="img" aria-labelledby="title desc">
  <title id="title">CopilotScope architecture — clients, local deployment, cloud deployment</title>
  <desc id="desc">Copilot clients emit OTel to a single collector endpoint. In the basic setup they point at the local collector, which can either be the only sink or stream sessions upstream to an Azure deployment. Azure adds a judge agent and cross-device sync.</desc>

  <style>
    .t  { font: 400 14px "Helvetica Neue", Arial, sans-serif; fill: #2c2c2a; }
    .ts { font: 400 12px "Helvetica Neue", Arial, sans-serif; fill: #444441; }
    .th { font: 500 14px "Helvetica Neue", Arial, sans-serif; fill: #2c2c2a; }
    .arr { stroke: #5f5e5a; stroke-width: 1.5; fill: none; }
    @media (prefers-color-scheme: dark) {
      .t, .th { fill: #ececea; }
      .ts { fill: #c8c7c2; }
      .arr { stroke: #b4b2a9; }
    }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ============ Clients envelope ============ -->
  <rect x="20" y="20" width="640" height="120" rx="14" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="th" x="340" y="42" text-anchor="middle">Copilot clients — agnostic emitters</text>
  <text class="ts" x="340" y="58" text-anchor="middle">All point at ONE OTLP endpoint · basic setup = local collector</text>

  <rect x="40"  y="76" width="140" height="48" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="110" y="97"  text-anchor="middle" dominant-baseline="central">VS Code</text>
  <text class="ts" x="110" y="112" text-anchor="middle" dominant-baseline="central">gen_ai.* spans + metrics</text>

  <rect x="192" y="76" width="140" height="48" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="262" y="97"  text-anchor="middle" dominant-baseline="central">Copilot CLI</text>
  <text class="ts" x="262" y="112" text-anchor="middle" dominant-baseline="central">github.copilot.* dialect</text>

  <rect x="344" y="76" width="140" height="48" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="414" y="97"  text-anchor="middle" dominant-baseline="central">Claude Code</text>
  <text class="ts" x="414" y="112" text-anchor="middle" dominant-baseline="central">claude_code.* — adapter TBD</text>

  <rect x="496" y="76" width="144" height="48" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="568" y="97"  text-anchor="middle" dominant-baseline="central">GitHub Metrics API</text>
  <text class="ts" x="568" y="112" text-anchor="middle" dominant-baseline="central">Org-level polling — TBD</text>

  <!-- Clients → local -->
  <line x1="340" y1="140" x2="180" y2="180" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="248" y="156" text-anchor="middle">OTLP/HTTP :4318</text>

  <!-- ============ Local envelope ============ -->
  <rect x="20" y="184" width="320" height="360" rx="16" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="th" x="180" y="206" text-anchor="middle">Local — Docker Compose (today)</text>
  <text class="ts" x="180" y="222" text-anchor="middle">On-machine, works fully offline</text>

  <rect x="40" y="238" width="280" height="60" rx="8" fill="#EEEDFE" stroke="#3C3489" stroke-width="0.5"/>
  <text class="th" x="180" y="258" text-anchor="middle" dominant-baseline="central">Collector (ASP.NET)</text>
  <text class="ts" x="180" y="276" text-anchor="middle" dominant-baseline="central">OTLP ingest · quality engine</text>
  <text class="ts" x="180" y="290" text-anchor="middle" dominant-baseline="central">insights pipeline · REST API</text>

  <rect x="40"  y="312" width="130" height="52" rx="8" fill="#EEEDFE" stroke="#3C3489" stroke-width="0.5"/>
  <text class="th" x="105" y="332" text-anchor="middle" dominant-baseline="central">Dashboard</text>
  <text class="ts" x="105" y="348" text-anchor="middle" dominant-baseline="central">Blazor Server</text>

  <rect x="190" y="312" width="130" height="52" rx="8" fill="#EEEDFE" stroke="#3C3489" stroke-width="0.5"/>
  <text class="th" x="255" y="332" text-anchor="middle" dominant-baseline="central">Postgres</text>
  <text class="ts" x="255" y="348" text-anchor="middle" dominant-baseline="central">Session snapshots</text>

  <line x1="180" y1="298" x2="105" y2="312" class="arr" marker-end="url(#arrow)"/>
  <line x1="180" y1="298" x2="255" y2="312" class="arr" marker-end="url(#arrow)"/>

  <rect x="40" y="384" width="280" height="40" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="ts" x="180" y="408" text-anchor="middle" dominant-baseline="central">Distribution — GHCR images, one compose file</text>

  <rect x="40" y="442" width="280" height="88" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text class="th" x="180" y="464" text-anchor="middle" dominant-baseline="central">Judge agent — not available locally</text>
  <text class="ts" x="180" y="482" text-anchor="middle" dominant-baseline="central">LLM-graded rubrics (SPUR, G-Eval)</text>
  <text class="ts" x="180" y="498" text-anchor="middle" dominant-baseline="central">Deep frustration classification</text>
  <text class="ts" x="180" y="514" text-anchor="middle" dominant-baseline="central">Needs model access + token budget</text>

  <!-- ============ Cloud envelope ============ -->
  <rect x="360" y="184" width="300" height="360" rx="16" fill="#E6F1FB" stroke="#0C447C" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="th" x="510" y="206" text-anchor="middle">Azure — Bicep (planned)</text>
  <text class="ts" x="510" y="222" text-anchor="middle">Same core, provisioned as IaC</text>

  <rect x="380" y="238" width="260" height="60" rx="8" fill="#EEEDFE" stroke="#3C3489" stroke-width="0.5"/>
  <text class="th" x="510" y="258" text-anchor="middle" dominant-baseline="central">Collector — Container Apps</text>
  <text class="ts" x="510" y="276" text-anchor="middle" dominant-baseline="central">Same image, EasyAuth ingress</text>
  <text class="ts" x="510" y="290" text-anchor="middle" dominant-baseline="central">Judge-enabled configuration</text>

  <rect x="380" y="312" width="120" height="52" rx="8" fill="#EEEDFE" stroke="#3C3489" stroke-width="0.5"/>
  <text class="th" x="440" y="332" text-anchor="middle" dominant-baseline="central">Dashboard</text>
  <text class="ts" x="440" y="348" text-anchor="middle" dominant-baseline="central">Static Web App</text>

  <rect x="520" y="312" width="120" height="52" rx="8" fill="#EEEDFE" stroke="#3C3489" stroke-width="0.5"/>
  <text class="th" x="580" y="332" text-anchor="middle" dominant-baseline="central">PostgreSQL</text>
  <text class="ts" x="580" y="348" text-anchor="middle" dominant-baseline="central">Flexible Server</text>

  <line x1="510" y1="298" x2="440" y2="312" class="arr" marker-end="url(#arrow)"/>
  <line x1="510" y1="298" x2="580" y2="312" class="arr" marker-end="url(#arrow)"/>

  <rect x="380" y="384" width="260" height="80" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th" x="510" y="406" text-anchor="middle" dominant-baseline="central">Judge agent — Azure AI Foundry</text>
  <text class="ts" x="510" y="424" text-anchor="middle" dominant-baseline="central">Consumes captured transcript</text>
  <text class="ts" x="510" y="440" text-anchor="middle" dominant-baseline="central">Writes graded insights back</text>
  <text class="ts" x="510" y="456" text-anchor="middle" dominant-baseline="central">Key Vault holds model keys</text>

  <line x1="510" y1="364" x2="510" y2="384" class="arr" marker-end="url(#arrow)"/>
  <line x1="510" y1="384" x2="510" y2="364" class="arr" marker-end="url(#arrow)" stroke-dasharray="3 3"/>

  <rect x="380" y="478" width="260" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="510" y="498" text-anchor="middle" dominant-baseline="central">Identity — Entra ID</text>
  <text class="ts" x="510" y="514" text-anchor="middle" dominant-baseline="central">Per-user session scoping</text>

  <!-- ============ Sync channels ============ -->
  <text class="th" x="40" y="574">Two ways sessions reach the cloud</text>

  <rect x="40" y="586" width="600" height="70" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="th" x="340" y="608" text-anchor="middle" dominant-baseline="central">1. Streaming — local collector forwards each OTLP batch upstream</text>
  <text class="ts" x="340" y="626" text-anchor="middle" dominant-baseline="central">Sessions appear in cloud in near-real-time · offline queue drains on reconnect</text>
  <text class="ts" x="340" y="642" text-anchor="middle" dominant-baseline="central">Reuses the existing Forwarder · content-capture flag preserved</text>

  <rect x="40" y="668" width="600" height="60" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="th" x="340" y="688" text-anchor="middle" dominant-baseline="central">2. On-prem logs — periodic sync of persisted sessions</text>
  <text class="ts" x="340" y="706" text-anchor="middle" dominant-baseline="central">Batch replay from Postgres · works after the fact · same auth path</text>

  <line x1="180" y1="530" x2="180" y2="586" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
  <line x1="510" y1="530" x2="510" y2="586" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>

  <!-- ============ Legend ============ -->
  <text class="th" x="40" y="762">Legend</text>
  <rect x="40"  y="774" width="16" height="16" rx="3" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="ts" x="62"  y="786">Clients / external / identity</text>
  <rect x="220" y="774" width="16" height="16" rx="3" fill="#EEEDFE" stroke="#3C3489" stroke-width="0.5"/>
  <text class="ts" x="242" y="786">CopilotScope core (shared)</text>
  <rect x="410" y="774" width="16" height="16" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="ts" x="432" y="786">Judge — cloud only</text>
  <rect x="560" y="774" width="16" height="16" rx="3" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="ts" x="582" y="786">Sync path</text>
</svg>
